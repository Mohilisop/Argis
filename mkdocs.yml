site_name: Argis
site_description: The all-seeing OSINT scanner — hunt down accounts across 500+ platforms with 50-agent deep investigation
site_url: https://mohilisop.github.io/argis
repo_url: https://github.com/Mohilisop/Argis
repo_name: Mohilisop/Argis
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: cyan
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: cyan
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Mohilisop/Argis
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/argis/

copyright: Copyright &copy; 2024 Mohilisop

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.emoji
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: install.md
  - Getting Started: getting-started.md
  - Surveillance:
    - scan: commands/scan.md
    - scan-image: commands/scan-image.md
    - scan-face: commands/scan-face.md
    - setup-celebrity-db: commands/setup-celebrity-db.md
  - Intelligence:
    - investigate: commands/investigate.md
    - me: commands/me.md
    - breach: commands/breach.md
    - mentions: commands/mentions.md
    - locate: commands/locate.md
    - link: commands/link.md
    - guard: commands/guard.md
    - doctor: commands/doctor.md
  - Reconnaissance:
    - recon: commands/recon.md
    - discover: commands/discover.md
    - domain: commands/domain.md
    - myip: commands/myip.md
  - Tracking:
    - history: commands/history.md
    - clear-history: commands/clear-history.md
    - monitor: commands/monitor.md
    - echo: commands/echo.md
  - Analysis:
    - exposure: commands/exposure.md
    - timeline: commands/timeline.md
    - graph: commands/graph.md
    - compare: commands/compare.md
    - wayback: commands/wayback.md
    - media-review: commands/media-review.md
    - media-apply: commands/media-apply.md
    - media-clear: commands/media-clear.md
  - Utilities:
    - web: commands/web.md
    - mcp: commands/mcp.md
    - search: commands/search.md
    - stats: commands/stats.md
    - categories: commands/categories.md
    - import-sites: commands/import-sites.md
  - Guides:
    - Configuration: guides/configuration.md
    - Output Formats: guides/output-formats.md
    - Webhooks & Notifications: guides/webhooks.md
    - Troubleshooting: guides/troubleshooting.md
  - About:
    - Changelog: changelog.md
    - License: license.md