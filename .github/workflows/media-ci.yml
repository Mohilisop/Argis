name: Media CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  media-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install -e ".[dev,intel]"
      - name: Run focused media tests
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -vv \
            tests/test_profile_media_apis.py \
            tests/test_media_review.py \
            tests/test_media_decisions.py \
            tests/test_dossier_pipeline.py 2>&1 | tee media-test.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"
      - name: Publish failure details as an issue
        if: failure() && steps.pytest.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const text = fs.existsSync('media-test.log')
              ? fs.readFileSync('media-test.log', 'utf8').slice(-50000)
              : 'No pytest log was produced.';
            const marker = '<!-- argis-media-ci -->';
            const body = `${marker}\nFocused media tests failed on ${context.sha}.\n\n<details><summary>pytest output</summary>\n\n\`\`\`text\n${text}\n\`\`\`\n</details>`;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci,media'
            });
            const issue = existing.find(item => item.body && item.body.includes(marker));
            if (issue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title: 'CI: failing media tests',
                body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'CI: failing media tests',
                body,
                labels: ['ci', 'media']
              });
            }
      - name: Upload media test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: media-test-log
          path: media-test.log
